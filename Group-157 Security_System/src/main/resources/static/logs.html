<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System</title>
    
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
    }

    .layout {
        display: flex;
        min-height: 100vh;
    }

    .sidebar {
        width: 220px;
        height: 100vh;
        background: rgba(15, 23, 42, 0.95);
        border-right: 1px solid rgba(148, 163, 184, 0.2);
        padding: 14px 10px;
        position: sticky;
        top: 0;
        transition: all 0.3s ease;
        overflow: hidden;
    }

    .sidebar.collapsed {
        width: 70px;
    }

    .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        padding: 4px 2px;
    }

    .brand {
        color: #cbd5e1;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
    }

    .toggle-btn {
        border: none;
        border-radius: 8px;
        background: #1e293b;
        color: #e2e8f0;
        width: 34px;
        height: 34px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .toggle-btn:hover {
        background: #334155;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    .nav-item {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 6px 0;
        padding: 10px 10px;
        border-radius: 10px;
        cursor: pointer;
        color: #cbd5e1;
        border: 1px solid transparent;
        background: transparent;
        transition: all 0.2s ease;
    }

    .nav-item:hover {
        background: rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.3);
    }

    .nav-item.active {
        background: linear-gradient(90deg, rgba(59, 130, 246, 0.3), rgba(99, 102, 241, 0.25));
        border-color: rgba(99, 102, 241, 0.45);
        color: #ffffff;
    }

    .menu-icon {
        width: 26px;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        color: #93c5fd;
        flex-shrink: 0;
    }

    .menu-text {
        white-space: nowrap;
    }

    .sidebar.collapsed .menu-text,
    .sidebar.collapsed .brand {
        display: none;
    }

    .content {
        flex: 1;
        padding: 20px;
        transition: all 0.3s ease;
    }

    .card {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.35);
    }

    .dashboard-frontpage {
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.75), rgba(30, 27, 75, 0.72));
        border: 1px solid rgba(148, 163, 184, 0.22);
    }

    .dashboard-header {
        margin-bottom: 16px;
    }

    .dashboard-header h2 {
        margin: 0;
        font-size: 24px;
        color: #e2e8f0;
    }

    .dashboard-header p {
        margin: 6px 0 0;
        color: #94a3b8;
        font-size: 13px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 12px;
        margin-bottom: 14px;
    }

    .stat-card {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        backdrop-filter: blur(7px);
        -webkit-backdrop-filter: blur(7px);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stat-card:hover,
    .dashboard-panel:hover {
        transform: scale(1.01);
        box-shadow: 0 10px 24px rgba(59, 130, 246, 0.14);
    }

    .stat-title {
        color: #94a3b8;
        font-size: 12px;
        margin-bottom: 8px;
    }

    .stat-value {
        font-size: 30px;
        font-weight: 700;
        color: #e2e8f0;
    }

    .secure {
        color: #22c55e;
    }

    .dashboard-panels {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
    }

    .dashboard-panel {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        backdrop-filter: blur(7px);
        -webkit-backdrop-filter: blur(7px);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .panel-title {
        margin: 0 0 14px;
        font-size: 16px;
        color: #e2e8f0;
    }

    .health-item {
        margin-bottom: 12px;
    }

    .health-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #94a3b8;
        font-size: 13px;
        margin-bottom: 6px;
    }

    .progress-track {
        height: 8px;
        border-radius: 999px;
        background: #1e293b;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        border-radius: 999px;
    }

    .fill-green {
        width: 45%;
        background: #22c55e;
    }

    .fill-yellow {
        width: 62%;
        background: #f59e0b;
    }

    .threat {
        display: inline-block;
        margin-top: 2px;
        font-weight: 700;
        color: #22c55e;
    }

    .activity-list {
        max-height: 190px;
        overflow-y: auto;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .activity-item {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px 11px;
        font-size: 13px;
        color: #e2e8f0;
        transition: background-color 0.2s ease;
    }

    .activity-item:nth-child(even) {
        background: rgba(148, 163, 184, 0.07);
    }

    .activity-item:hover {
        background: rgba(59, 130, 246, 0.18);
    }

    .activity-icon {
        color: #3b82f6;
        font-size: 12px;
        flex-shrink: 0;
    }

    .logs-shell {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 14px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .logs-header h2 {
        margin: 0;
    }

    .logs-subtitle {
        margin: 6px 0 0;
        color: #94a3b8;
        font-size: 13px;
    }

    .logs-tabs {
        margin: 14px 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logs-tab-btn {
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 8px;
        background: #1f2937;
        color: #cbd5e1;
        padding: 9px 14px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .logs-tab-btn.active {
        color: #ffffff;
        border-color: rgba(99, 102, 241, 0.55);
        background: linear-gradient(90deg, #3b82f6, #6366f1);
        box-shadow: 0 0 14px rgba(99, 102, 241, 0.38);
    }

    .logs-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
    }

    .logs-input,
    .logs-select {
        height: 36px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #e2e8f0;
        padding: 0 10px;
        transition: all 0.2s ease;
    }

    .logs-input {
        flex: 1;
        min-width: 220px;
    }

    .logs-select {
        min-width: 160px;
    }

    .logs-input:focus,
    .logs-select:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    .logs-view.hidden {
        display: none;
    }

    .table-wrap {
        overflow: auto;
        max-height: 360px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .logs-table {
        width: 100%;
        min-width: 860px;
        border-collapse: collapse;
        background: rgba(30, 41, 59, 0.62);
    }

    .logs-table th,
    .logs-table td {
        text-align: left;
        padding: 10px 11px;
        border-bottom: 1px solid #334155;
        font-size: 13px;
        vertical-align: top;
    }

    .logs-table th {
        background: #334155;
        color: #e2e8f0;
    }

    .logs-table tbody tr:nth-child(even) {
        background: rgba(148, 163, 184, 0.07);
    }

    .logs-table tbody tr:hover {
        background: rgba(59, 130, 246, 0.16);
    }

    .mono {
        font-family: "Consolas", "Courier New", monospace;
    }

    .count-high { color: #ef4444; font-weight: 700; }
    .count-medium { color: #f59e0b; font-weight: 700; }
    .count-low { color: #22c55e; font-weight: 700; }

    .tag-badge {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 700;
        margin-right: 4px;
    }

    .tag-danger {
        background: rgba(239, 68, 68, 0.86);
        color: #fee2e2;
    }

    .tag-warn {
        background: rgba(245, 158, 11, 0.86);
        color: #fef3c7;
    }

    .tag-normal {
        background: rgba(34, 197, 94, 0.8);
        color: #dcfce7;
    }

    .geo-card {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 10px 25px rgba(2, 6, 23, 0.35);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .geo-head h2 {
        margin: 0;
    }

    .geo-head p {
        margin: 6px 0 12px;
        color: #94a3b8;
        font-size: 13px;
    }

    #geoMap {
        width: 100%;
        height: 400px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        overflow: hidden;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
    }

    .geo-table-wrap {
        margin-top: 12px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .geo-table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(15, 23, 42, 0.65);
    }

    .geo-table th,
    .geo-table td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #334155;
        font-size: 13px;
    }

    .geo-table th {
        background: #334155;
        color: #e2e8f0;
    }

    .geo-table tbody tr:nth-child(even) {
        background: rgba(148, 163, 184, 0.07);
    }

    .geo-table tbody tr:hover {
        background: rgba(59, 130, 246, 0.15);
    }

    .pulse-marker {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.95);
        border: 2px solid rgba(254, 202, 202, 0.9);
        box-shadow: 0 0 0 rgba(239, 68, 68, 0.75);
        animation: pulse 1.6s ease-out infinite, markerFadeIn 0.45s ease;
    }

    @keyframes pulse {
        0% {
            transform: scale(0.92);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.75);
        }
        70% {
            transform: scale(1.15);
            box-shadow: 0 0 0 14px rgba(239, 68, 68, 0);
        }
        100% {
            transform: scale(0.92);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
    }

    @keyframes markerFadeIn {
        from { opacity: 0; transform: scale(0.5); }
        to { opacity: 1; transform: scale(1); }
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
        background: #0f172a;
        color: #e2e8f0;
        border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .profile-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 12px;
    }

    .profile-header-card {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 10px 26px rgba(2, 6, 23, 0.35);
    }

    .profile-id {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .avatar {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: #ffffff;
        font-size: 20px;
        font-weight: 700;
        box-shadow: 0 0 18px rgba(59, 130, 246, 0.3);
    }

    .profile-name {
        margin: 0;
        font-size: 19px;
        color: #e2e8f0;
    }

    .profile-role {
        margin: 4px 0 0;
        font-size: 13px;
        color: #94a3b8;
    }

    .verified-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 6px 11px;
        font-size: 12px;
        font-weight: 700;
        color: #dcfce7;
        background: rgba(34, 197, 94, 0.22);
        border: 1px solid rgba(34, 197, 94, 0.55);
    }

    .profile-card {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 22px rgba(2, 6, 23, 0.3);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .profile-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 26px rgba(59, 130, 246, 0.14);
    }

    .profile-card h3 {
        margin: 0 0 12px;
        font-size: 15px;
        color: #e2e8f0;
    }

    .info-row {
        display: grid;
        grid-template-columns: 145px 1fr;
        gap: 10px;
        padding: 7px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    .info-row:last-child {
        border-bottom: none;
    }

    .info-label {
        color: #94a3b8;
        font-size: 13px;
    }

    .info-value {
        color: #e2e8f0;
        font-size: 13px;
        text-align: right;
    }

    .status-active {
        color: #22c55e;
        font-weight: 700;
    }

    .access-full {
        color: #60a5fa;
        font-weight: 700;
    }

    .verification-list {
        display: grid;
        gap: 8px;
    }

    .verification-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.55);
    }

    .check {
        color: #22c55e;
        font-weight: 700;
    }

    .clearance {
        margin-top: 10px;
        display: inline-block;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 700;
        color: #bfdbfe;
        background: rgba(59, 130, 246, 0.25);
        border: 1px solid rgba(59, 130, 246, 0.5);
    }

    .mini-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
    }

    .mini-stat {
        border-radius: 10px;
        padding: 10px;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .mini-label {
        font-size: 11px;
        color: #94a3b8;
    }

    .mini-value {
        margin-top: 5px;
        font-size: 18px;
        font-weight: 700;
        color: #e2e8f0;
    }

    .profile-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 12px;
    }

    .edit-btn {
        border: 1px solid rgba(59, 130, 246, 0.5);
        border-radius: 8px;
        background: rgba(59, 130, 246, 0.18);
        color: #e2e8f0;
        padding: 8px 12px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .edit-btn:hover {
        box-shadow: 0 0 12px rgba(59, 130, 246, 0.35);
        background: rgba(59, 130, 246, 0.28);
    }

    .settings-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
    }

    .settings-card {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 22px rgba(2, 6, 23, 0.32);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .settings-card h3 {
        margin: 0 0 12px;
        font-size: 15px;
        color: #e2e8f0;
    }

    .settings-card.full {
        grid-column: 1 / -1;
    }

    .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .control-btn {
        border: none;
        border-radius: 8px;
        padding: 9px 13px;
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .control-btn:hover {
        transform: scale(1.02);
    }

    .btn-blue { background: #3b82f6; }
    .btn-red { background: #ef4444; }
    .btn-purple { background: #8b5cf6; }
    .btn-green { background: #16a34a; }

    .btn-blue:hover { box-shadow: 0 0 14px rgba(59, 130, 246, 0.45); }
    .btn-red:hover { box-shadow: 0 0 14px rgba(239, 68, 68, 0.4); }
    .btn-purple:hover { box-shadow: 0 0 14px rgba(139, 92, 246, 0.42); }
    .btn-green:hover { box-shadow: 0 0 14px rgba(34, 197, 94, 0.42); }

    .toggle-list {
        display: grid;
        gap: 10px;
    }

    .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #e2e8f0;
        font-size: 13px;
    }

    .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
    }

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background: #64748b;
        border-radius: 999px;
        transition: 0.2s;
    }

    .slider:before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        top: 3px;
        background: #ffffff;
        border-radius: 50%;
        transition: 0.2s;
    }

    .switch input:checked + .slider {
        background: #22c55e;
    }

    .switch input:checked + .slider:before {
        transform: translateX(20px);
    }

    .config-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 10px;
    }

    .config-field label {
        display: block;
        margin-bottom: 6px;
        color: #94a3b8;
        font-size: 12px;
    }

    .config-field input {
        width: 100%;
        height: 36px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #e2e8f0;
        padding: 0 10px;
    }

    .config-field input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    .db-meta {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
        font-size: 13px;
    }

    .db-label {
        color: #94a3b8;
    }

    .db-value {
        color: #e2e8f0;
        margin-left: 8px;
    }

    .connected {
        color: #22c55e;
        font-weight: 700;
    }

    .danger-zone {
        border: 1px solid rgba(239, 68, 68, 0.45);
        background: rgba(127, 29, 29, 0.22);
    }

    .danger-text {
        margin: 0 0 10px;
        color: #fca5a5;
        font-size: 12px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 10px;
        border: 1px solid #334155;
        text-align: center;
    }

    th {
        background: #334155;
    }

    tr:hover {
        background: #475569;
    }

    button {
        padding: 6px 12px;
        background: crimson;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 6px;
        margin-right: 8px;
    }

    .top-btn {
        margin-bottom: 10px;
        background: #3b82f6;
    }

    li {
        margin: 8px 0;
        color: #cbd5e1;
    }

    .muted {
        color: #94a3b8;
        margin-top: 8px;
    }
</style>
</head>
<body>
<div class="layout">
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="brand">Admin Console</div>
            <button id="toggleSidebar" class="toggle-btn" type="button" title="Toggle Sidebar">?</button>
        </div>

        <div class="nav-item" data-section="dashboard" onclick="window.location.href='dashboard.html'" title="Dashboard">
            <span class="menu-icon">D</span>
            <span class="menu-text">Dashboard</span>
        </div>
        <div class="nav-item active" data-section="logs" onclick="window.location.href='logs.html'" title="Logs">
            <span class="menu-icon">L</span>
            <span class="menu-text">Logs</span>
        </div>
        <div class="nav-item" data-section="geo" onclick="window.location.href='geo.html'" title="Geo Heatmap">
            <span class="menu-icon">G</span>
            <span class="menu-text">Geo Heatmap</span>
        </div>
        <div class="nav-item" data-section="attackGraphs" onclick="window.location.href='attack.html'" title="Attack Graphs">
            <span class="menu-icon">A</span>
            <span class="menu-text">Attack Graphs</span>
        </div>
        <div class="nav-item" data-section="profile" onclick="window.location.href='profile.html'" title="Admin Profile">
            <span class="menu-icon">A</span>
            <span class="menu-text">Admin Profile</span>
        </div>
    </aside>

    <main class="content">
        <div id="logs" class="card">
            <div class="logs-shell">
                <div class="logs-header">
                    <h2>System Logs</h2>
                    <p class="logs-subtitle">Monitor and analyze system activity</p>
                </div>

                <div class="logs-tabs">
                    <button id="rawLogsBtn" class="logs-tab-btn active" type="button">Raw Logs</button>
                    <button id="summaryLogsBtn" class="logs-tab-btn" type="button">Summary Logs</button>
                    <button class="top-btn" style="margin: 0 0 0 auto;" onclick="loadLogs()">Refresh</button>
                </div>

                <div class="logs-controls">
                    <input id="logsSearch" class="logs-input" type="text" placeholder="Search by IP or username">
                    <select id="logsEndpointFilter" class="logs-select">
                        <option value="">All Endpoints</option>
                    </select>
                    <select id="logsIpFilter" class="logs-select">
                        <option value="">All IPs</option>
                    </select>
                </div>

                <div id="rawLogsView" class="logs-view">
                    <div class="table-wrap">
                        <table class="logs-table">
                            <thead>
                                <tr>
                                    <th>IP Address</th>
                                    <th>Total Attempts</th>
                                    <th>Unique Endpoints</th>
                                    <th>First Seen</th>
                                    <th>Last Seen</th>
                                </tr>
                            </thead>
                            <tbody id="rawLogsTable"></tbody>
                        </table>
                    </div>
                </div>

                <div id="summaryLogsView" class="logs-view hidden">
                    <div class="table-wrap">
                        <table class="logs-table">
                            <thead>
                                <tr>
                                    <th>IP Address</th>
                                    <th>Endpoint</th>
                                    <th>Username</th>
                                    <th>Password / Payload</th>
                                    <th>User-Agent</th>
                                    <th>Timestamp</th>
                                    <th>Tag</th>
                                </tr>
                            </thead>
                            <tbody id="summaryLogsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>


let logsData = [];

function getLogTimestamp(log) {
    return log.timestamp || log.time || log.createdAt || log.date || "N/A";
}

function getPayload(log) {
    if (log.payload) return log.payload;
    if (log.password) return log.password;
    if (log.action) return log.action;
    return "N/A";
}

function detectTag(log, data) {
    const username = String(log.username || "").toLowerCase();
    const endpoint = String(log.endpoint || "").toLowerCase();

    const now = new Date(log.time || Date.now());

    // ============================
    // 🔥 SQL INJECTION DETECTION
    // ============================
    if (
        username.includes("'") ||
        username.includes("--") ||
        username.includes(" or ") ||
        endpoint.includes("union")
    ) {
        return "SQL Injection";
    }

    // ============================
    // 🔥 BRUTE FORCE DETECTION
    // ============================
    const sameUserLogs = data.filter(entry =>
        entry.ip === log.ip &&
        String(entry.username || "").toLowerCase() === username
    );

    const uniquePasswords = new Set(
        sameUserLogs.map(entry =>
            String(entry.password || entry.payload || "").toLowerCase()
        )
    );

    if (uniquePasswords.size >= 4) {
        return "Brute Force";
    }

    // ============================
    // 🔥 RATE LIMIT DETECTION (LOW PRIORITY)
    // ============================
    const recentRequests = data.filter(entry => {
        if (entry.ip !== log.ip) return false;

        const entryTime = new Date(entry.time || Date.now());
        return (now - entryTime) <= 500; // 0.5 sec window
    });

    const rateCount = recentRequests.length;

    if (rateCount >= 10) {
        return "Rate Limit Attack";
    }

    // ============================
    // ✅ NORMAL TRAFFIC
    // ============================
    return "Endpoint Accessed";
}

function filterLogs() {
    const search = document.getElementById("logsSearch").value.trim().toLowerCase();
    const endpoint = document.getElementById("logsEndpointFilter").value;
    const ip = document.getElementById("logsIpFilter").value;

    return logsData.filter(log => {
        const matchSearch = !search ||
            String(log.ip || "").toLowerCase().includes(search) ||
            String(log.username || "").toLowerCase().includes(search);
        const matchEndpoint = !endpoint || log.endpoint === endpoint;
        const matchIp = !ip || log.ip === ip;
        return matchSearch && matchEndpoint && matchIp;
    });
}

function fillLogFilters() {
    const endpointSelect = document.getElementById("logsEndpointFilter");
    const ipSelect = document.getElementById("logsIpFilter");
    const selectedEndpoint = endpointSelect.value;
    const selectedIp = ipSelect.value;
    const endpoints = [...new Set(logsData.map(log => log.endpoint).filter(Boolean))].sort();
    const ips = [...new Set(logsData.map(log => log.ip).filter(Boolean))].sort();

    endpointSelect.innerHTML = '<option value="">All Endpoints</option>' +
        endpoints.map(item => `<option value="${item}">${item}</option>`).join("");
    ipSelect.innerHTML = '<option value="">All IPs</option>' +
        ips.map(item => `<option value="${item}">${item}</option>`).join("");

    endpointSelect.value = endpoints.includes(selectedEndpoint) ? selectedEndpoint : "";
    ipSelect.value = ips.includes(selectedIp) ? selectedIp : "";
}

function renderLogs() {
    const filtered = filterLogs();
    const rawTable = document.getElementById("rawLogsTable");
    const summaryTable = document.getElementById("summaryLogsTable");

    rawTable.innerHTML = "";
    summaryTable.innerHTML = "";

    // ===== GROUP DATA (for summary) =====
    const grouped = {};

    filtered.forEach(log => {
        const ip = log.ip || "N/A";

        if (!grouped[ip]) {
            grouped[ip] = {
                ip: ip,
                attempts: 0,
                endpoints: new Set(),
                firstSeen: getLogTimestamp(log),
                lastSeen: getLogTimestamp(log)
            };
        }

        grouped[ip].attempts++;
        grouped[ip].endpoints.add(log.endpoint || "N/A");

        if (grouped[ip].firstSeen === "N/A") {
            grouped[ip].firstSeen = getLogTimestamp(log);
        }

        grouped[ip].lastSeen = getLogTimestamp(log);
    });

    // ===== RAW TABLE (YOUR CURRENT BEHAVIOR - KEEPING SAME) =====
    Object.values(grouped)
        .sort((a, b) => b.attempts - a.attempts)
        .forEach(entry => {

            let countClass = "count-low";
            if (entry.attempts >= 8) countClass = "count-high";
            else if (entry.attempts >= 4) countClass = "count-medium";

            rawTable.innerHTML += `
                <tr>
                    <td>${entry.ip}</td>
                    <td class="${countClass}">${entry.attempts}</td>
                    <td>${entry.endpoints.size}</td>
                    <td>${entry.firstSeen}</td>
                    <td>${entry.lastSeen}</td>
                </tr>
            `;
        });

    // ===== SUMMARY TABLE (DETAILED LOGS - KEEPING SAME) =====
    filtered.forEach(log => {
        const tag = detectTag(log, filtered);

        const tagClass =
            tag === "SQL Injection" ? "tag-danger" :
            tag === "Brute Force" ? "tag-warn" :
            "tag-normal";

        summaryTable.innerHTML += `
            <tr>
                <td>${log.ip || "N/A"}</td>
                <td>${log.endpoint || "N/A"}</td>
                <td>${log.username || "N/A"}</td>
                <td class="mono">${getPayload(log)}</td>
                <td>${log.userAgent || "N/A"}</td>
                <td>${getLogTimestamp(log)}</td>
                <td><span class="tag-badge ${tagClass}">${tag}</span></td>
            </tr>
        `;
    });
}
function switchLogsView(view) {
    const rawView = document.getElementById("rawLogsView");
    const summaryView = document.getElementById("summaryLogsView");
    const rawBtn = document.getElementById("rawLogsBtn");
    const summaryBtn = document.getElementById("summaryLogsBtn");

    if (view === "raw") {
        rawView.classList.remove("hidden");
        summaryView.classList.add("hidden");
        rawBtn.classList.add("active");
        summaryBtn.classList.remove("active");
    } else {
        summaryView.classList.remove("hidden");
        rawView.classList.add("hidden");
        summaryBtn.classList.add("active");
        rawBtn.classList.remove("active");
    }
}

function updateDashboard() {
    const safeLogs = Array.isArray(logsData) ? logsData : [];
    const total = safeLogs.length;
    const validIps = safeLogs.map(log => log && log.ip).filter(Boolean);
    const uniqueIps = new Set(validIps);
    const now = Date.now();

    const requestsPerMinute = safeLogs.filter(log => {
        const rawTs = log && (log.timestamp || log.time || log.createdAt || log.date);
        if (!rawTs) return false;
        const parsed = Date.parse(rawTs);
        if (Number.isNaN(parsed)) return false;
        return (now - parsed) <= 60000;
    }).length;

    let systemStatus = "SECURE";
    if (total > 100) {
        systemStatus = "CRITICAL";
    } else if (total > 50) {
        systemStatus = "UNDER ATTACK";
    }

    const cpu = Math.min(100, 20 + (total % 60));
    const memory = Math.min(100, 30 + (uniqueIps.size * 2));

    let threatLevel = "Low";
    if (total > 100) {
        threatLevel = "High";
    } else if (total > 50) {
        threatLevel = "Medium";
    }

    const totalEl = document.getElementById("totalAttacks");
    const activeEl = document.getElementById("activeAttackers");
    const rpmEl = document.getElementById("requestsPerMinute");
    const statusEl = document.getElementById("systemStatus");
    const cpuTextEl = document.getElementById("cpuUsageText");
    const memoryTextEl = document.getElementById("memoryUsageText");
    const cpuBarEl = document.getElementById("cpuBar");
    const memoryBarEl = document.getElementById("memoryBar");
    const threatEl = document.getElementById("threatLevel");
    const activityEl = document.getElementById("activityList");

    if (totalEl) totalEl.textContent = total.toLocaleString();
    if (activeEl) activeEl.textContent = uniqueIps.size.toLocaleString();
    if (rpmEl) rpmEl.textContent = requestsPerMinute.toLocaleString();
    if (statusEl) statusEl.textContent = systemStatus;
    if (cpuTextEl) cpuTextEl.textContent = cpu + "%";
    if (memoryTextEl) memoryTextEl.textContent = memory + "%";
    if (cpuBarEl) cpuBarEl.style.width = cpu + "%";
    if (memoryBarEl) memoryBarEl.style.width = memory + "%";
    if (threatEl) threatEl.textContent = threatLevel;

    if (activityEl) {
        const latestLogs = safeLogs.slice(-5).reverse();
        if (latestLogs.length === 0) {
            activityEl.innerHTML = `
                <div class="activity-item">
                    <span class="activity-icon">●</span>
                    <span>No recent activity</span>
                </div>
            `;
        } else {
            activityEl.innerHTML = latestLogs.map(log => {
                const ip = (log && log.ip) ? log.ip : "Unknown IP";
                const endpoint = (log && log.endpoint) ? log.endpoint : "unknown endpoint";
                const ts = (log && (log.timestamp || log.time || log.createdAt || log.date)) || "unknown time";
                return `
                    <div class="activity-item">
                        <span class="activity-icon">●</span>
                        <span>IP ${ip} accessed ${endpoint} at ${ts}</span>
                    </div>
                `;
            }).join("");
        }
    }
}

function loadLogs() {
    fetch("http://localhost:8080/logs", {
    credentials: "include"
})
        .then(res => res.json())
        .then(data => {
            logsData = Array.isArray(data) ? data : [];
            fillLogFilters();
            renderLogs();
            updateDashboard();
            if (window.renderAttackGraphs) {
                window.renderAttackGraphs(logsData);
            }
        })
        .catch(() => alert("Error loading logs"));
}



// ===== AUTO ACTIVITY =====
setInterval(loadLogs, 6000);

// ===== INITIAL LOAD =====
loadLogs();

// ===== TRACK ATTACKER =====
fetch("/admin-log");

// ===== SIDEBAR TOGGLE =====
document.getElementById("toggleSidebar").addEventListener("click", () => {
    document.getElementById("sidebar").classList.toggle("collapsed");
});

document.getElementById("rawLogsBtn").addEventListener("click", () => switchLogsView("raw"));
document.getElementById("summaryLogsBtn").addEventListener("click", () => switchLogsView("summary"));
document.getElementById("logsSearch").addEventListener("input", renderLogs);
document.getElementById("logsEndpointFilter").addEventListener("change", renderLogs);
document.getElementById("logsIpFilter").addEventListener("change", renderLogs);

</script>
</body>
</html>
