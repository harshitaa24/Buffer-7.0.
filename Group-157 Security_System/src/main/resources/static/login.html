<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Data Vault Access</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f172a 0%, #020617 60%, #01030a 100%);
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.portal {
    width: 100%;
    max-width: 440px;
    padding: 24px;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 24px;
}

.header h1 {
    margin: 0 0 8px;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #f8fafc;
}

.header p {
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.2px;
    color: #94a3b8;
}

/* LOGIN BOX */
.login-box {
    width: 100%;
    padding: 32px;
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow: 0 16px 45px rgba(2, 6, 23, 0.7), 0 0 24px rgba(37, 99, 235, 0.15);
}

/* INPUT */
.input-group {
    margin-bottom: 14px;
}

.input-group input {
    width: 100%;
    padding: 12px 13px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #020617;
    color: #f8fafc;
    font-size: 14px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.input-group input::placeholder {
    color: #64748b;
}

.input-group input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.24), 0 0 10px rgba(59, 130, 246, 0.3);
}

/* OPTIONS */
.options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2px 0 20px;
    font-size: 12px;
    color: #94a3b8;
}

.options label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.options input[type="checkbox"] {
    margin: 0;
    accent-color: #3b82f6;
    transform: translateY(-1px);
}

.forgot {
    color: #a5b4fc;
    text-decoration: none;
}

.forgot:hover {
    color: #c7d2fe;
    text-decoration: underline;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #2563eb, #06b6d4);
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
}

button:hover {
    box-shadow: 0 0 16px rgba(59, 130, 246, 0.55);
    transform: translateY(-1px);
}

/* MESSAGE */
#msg {
    margin-top: 16px;
    min-height: 20px;
    text-align: center;
    font-size: 14px;
    color: #f87171;
}
</style>
</head>

<body>

<main class="portal">
    <!-- HEADER -->
    <div class="header">
        <h1>Confidential Data Vault</h1>
        <p>Restricted Access • Authorized Personnel Only</p>
    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">
        <form id="loginForm">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Remember me
                </label>
            </div>

            <button type="submit" >Authenticate</button>
        </form>

        <div id="msg"></div>
    </div>
</main>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const res = await fetch("/login", {
        method: "POST",
        body: formData
    });

    const text = await res.text();

    console.log("Response:", text); // DEBUG

    if (text.trim() === "SUCCESS") {

        document.getElementById("msg").innerHTML = "<h3>Access granted...</h3>";

        // 🔥 THIS is what actually redirects
        setTimeout(() => {
            window.location.href = "/AdminX.html";
        }, 1000);

    } else {
        document.getElementById("msg").innerText = "Invalid credentials";
    }
});
</script>

</body>
</html>
