<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Data Control Panel</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0b1120;
    color: #e2e8f0;
}

.dashboard {
    display: none;
    min-height: 100vh;
}

.topbar {
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    background: linear-gradient(90deg, #0f172a, #111827);
    position: sticky;
    top: 0;
    z-index: 10;
}

.topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: #f8fafc;
}

.topbar p {
    margin: 2px 0 0;
    font-size: 12px;
    color: #94a3b8;
}

.status {
    font-size: 13px;
    color: #86efac;
    border: 1px solid rgba(134, 239, 172, 0.25);
    border-radius: 999px;
    padding: 7px 12px;
    background: rgba(22, 163, 74, 0.08);
}

.layout {
    display: flex;
    min-height: calc(100vh - 70px);
}

.sidebar {
    width: 230px;
    background: #0f172a;
    border-right: 1px solid rgba(148, 163, 184, 0.2);
    padding: 18px 12px;
}

.menu-item {
    width: 100%;
    text-align: left;
    margin-bottom: 8px;
    padding: 11px 12px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: #cbd5e1;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}

.menu-item:hover,
.menu-item.active {
    background: rgba(59, 130, 246, 0.15);
    border-color: rgba(59, 130, 246, 0.35);
    color: #f8fafc;
    transform: translateX(2px);
}

.main {
    flex: 1;
    padding: 22px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
}

.card {
    background: #111a2f;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 10px 25px rgba(2, 6, 23, 0.45);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(30, 64, 175, 0.2);
}

.card .label {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 8px;
}

.card .value {
    font-size: 24px;
    font-weight: 700;
    color: #f8fafc;
}

.section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
}

.section-title {
    margin: 0 0 12px;
    font-size: 16px;
    color: #f8fafc;
}

.file-list {
    display: grid;
    gap: 8px;
}

.file-btn {
    width: 100%;
    border: 1px solid rgba(148, 163, 184, 0.24);
    background: #0b1225;
    color: #cbd5e1;
    border-radius: 8px;
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
}

.file-btn:hover {
    border-color: rgba(96, 165, 250, 0.5);
    background: rgba(30, 64, 175, 0.2);
    color: #f8fafc;
}

.primary-btn {
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    background: linear-gradient(90deg, #2563eb, #06b6d4);
    color: #ffffff;
    font-weight: 600;
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
}

.primary-btn:hover {
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    transform: translateY(-1px);
}

pre {
    margin: 12px 0 0;
    background: #0b1225;
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 8px;
    padding: 10px;
    min-height: 140px;
    color: #93c5fd;
    white-space: pre-wrap;
    font-size: 12px;
}

.graph {
    margin-top: 6px;
    height: 170px;
    display: flex;
    align-items: flex-end;
    gap: 9px;
    padding: 12px;
    border-radius: 10px;
    background: #0b1225;
    border: 1px solid rgba(148, 163, 184, 0.22);
}

.bar {
    flex: 1;
    border-radius: 6px 6px 0 0;
    background: linear-gradient(180deg, #38bdf8, #1d4ed8);
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.35);
}

.muted {
    margin-top: 8px;
    color: #94a3b8;
    font-size: 12px;
}

#actionLog {
    margin-top: 10px;
    min-height: 18px;
    font-size: 12px;
    color: #86efac;
}
</style>
</head>
<body>

<div id="dashboard" class="dashboard">
    <header class="topbar">
        <div>
            <h1>Enterprise Data Control Panel</h1>
            <p>Internal Access • Confidential Systems</p>
        </div>
        <div class="status">Session Active • Admin Root</div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <button class="menu-item active" onclick="window.location.href='/AdminX.html'">Dashboard</button>
            <button class="menu-item" onclick="window.location.href='/settings.html'">Settings</button>
            <button class="menu-item" onclick="window.location.href='/login.html'">Logout</button>
        </aside>

        <main class="main">
            <section class="stats-grid">
                <article class="card">
                    <div class="label">Total Users</div>
                    <div class="value">12,458</div>
                </article>
                <article class="card">
                    <div class="label">Active Sessions</div>
                    <div class="value">342</div>
                </article>
                <article class="card">
                    <div class="label">Database Size</div>
                    <div class="value">2.3 TB</div>
                </article>
                <article class="card">
                    <div class="label">Security Status</div>
                    <div class="value" style="color:#86efac;">Stable</div>
                </article>
            </section>

            <section class="section-grid">
                <article class="card">
                    <h2 class="section-title">File Repository</h2>
                    <div class="file-list">
                        <button class="file-btn" data-file="config.pdf">config.pdf</button>
                        <button class="file-btn" data-file="db_backup.sql">db_backup.sql</button>
                        <button class="file-btn" data-file="payroll.xlsx">payroll.xlsx</button>
                        <button class="file-btn" data-file="credentials.txt">credentials.txt</button>
                    </div>
                    <div id="actionLog"></div>
                </article>

                <article class="card">
                    <h2 class="section-title">Database Access</h2>
                    <button id="fetchDbBtn" class="primary-btn">Fetch User Records</button>
                    <pre id="dbOutput">{ "status": "awaiting_query" }</pre>
                </article>

                <article class="card">
                    <h2 class="section-title">System Activity</h2>
                    <div class="graph">
                        <div class="bar" style="height: 30%"></div>
                        <div class="bar" style="height: 65%"></div>
                        <div class="bar" style="height: 48%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 54%"></div>
                        <div class="bar" style="height: 72%"></div>
                        <div class="bar" style="height: 42%"></div>
                    </div>
                    <p class="muted">System Activity</p>
                </article>
            </section>
        </main>
    </div>
</div>

<script>
window.addEventListener("load", () => {
    alert("Access Granted — Successful Login");
    setTimeout(() => {
        document.getElementById("dashboard").style.display = "block";
    }, 1200);
});

document.querySelectorAll(".menu-item").forEach((item) => {
    item.addEventListener("click", () => {
        document.querySelectorAll(".menu-item").forEach((el) => el.classList.remove("active"));
        item.classList.add("active");
    });
});

document.querySelectorAll(".file-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
        const file = btn.dataset.file;
        const actionLog = document.getElementById("actionLog");

        try {
            await fetch("/file-access?file=" + encodeURIComponent(file));
            actionLog.textContent = "Opened: " + file + " (activity logged)";
        } catch (e) {
            actionLog.textContent = "Opened: " + file + " (log service unavailable)";
        }
    });
});

document.getElementById("fetchDbBtn").addEventListener("click", async () => {
    const output = document.getElementById("dbOutput");
    const fallbackData = {
        query: "SELECT id, username, role FROM users LIMIT 5",
        records: [
            { id: 1001, username: "admin_root", role: "superadmin" },
            { id: 1047, username: "finance_ops", role: "analyst" },
            { id: 1089, username: "it_support", role: "operator" },
            { id: 1134, username: "audit_bot", role: "service" },
            { id: 1182, username: "payroll_sync", role: "service" }
        ]
    };

    try {
        const res = await fetch("/honeypot/db");
        const text = await res.text();
        output.textContent = text || JSON.stringify(fallbackData, null, 2);
    } catch (e) {
        output.textContent = JSON.stringify(fallbackData, null, 2);
    }
});
</script>

<script>
document.querySelectorAll(".file-btn").forEach(button => {
    button.addEventListener("click", async function () {

        const file = this.getAttribute("data-file");

        // optional: show fake loading
        this.innerText = "Downloading...";
        this.disabled = true;

        try {
            // 🔥 call your backend (logs + realism)
            const res = await fetch(`/api/download?file=${file}`);

            // optional: read response text
            const msg = await res.text();
            console.log(msg);

            // 🔥 trigger actual download
            window.location.href = "/" + file;

        } catch (err) {
            console.error(err);
        }

        this.innerText = file;
        this.disabled = false;
    });
});

   
</script>

</body>
</html>
